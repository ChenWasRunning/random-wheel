<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>幸福瞬间抽盒器</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #fff7f0;
    color: #5a3b2e;
    text-align: center;
  }

  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  h1 {
    font-size: 26px;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 14px;
    color: #8a6a5a;
    margin-bottom: 25px;
  }

  .wheel-wrap {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto 24px;
  }

  .pointer {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 30px solid #e66a6a;
    z-index: 3;
  }

  .wheel {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 8px solid #f2c6b4;
    background: conic-gradient(
      #ffe0e0 0deg 60deg,
      #fff0c7 60deg 120deg,
      #dff2dd 120deg 180deg,
      #dbeafe 180deg 240deg,
      #eadcff 240deg 300deg,
      #ffe2bd 300deg 360deg
    );
    position: relative;
    transition: transform 4s cubic-bezier(.12,.72,.18,1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
  }

  .num {
    position: absolute;
    font-size: 28px;
    font-weight: 700;
    color: #5a3b2e;
    width: 40px;
    height: 40px;
    line-height: 40px;
  }

  .n1 { top: 28px; left: 120px; }
  .n2 { top: 75px; right: 42px; }
  .n3 { bottom: 75px; right: 42px; }
  .n4 { bottom: 28px; left: 120px; }
  .n5 { bottom: 75px; left: 42px; }
  .n6 { top: 75px; left: 42px; }

  button {
    border: none;
    background: #e66a6a;
    color: white;
    font-size: 18px;
    padding: 13px 28px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(230,106,106,0.35);
  }

  button:disabled {
    background: #c9b8b0;
    cursor: not-allowed;
  }

  .result {
    margin-top: 22px;
    font-size: 22px;
    font-weight: 700;
    min-height: 32px;
  }

  .remaining {
    margin-top: 12px;
    font-size: 14px;
    color: #8a6a5a;
  }

  .seed {
    margin-bottom: 18px;
  }

  input {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #e0b8a8;
    font-size: 15px;
    width: 180px;
    text-align: center;
  }
</style>
</head>

<body>
<div class="container">
  <h1>幸福瞬间抽盒器</h1>
  <div class="subtitle">输入今日幸运 seed，抽取下一只线条小狗</div>

  <div class="seed">
    <input id="seed" placeholder="输入 seed" value="20260724" />
  </div>

  <div class="wheel-wrap">
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
      <div class="num n1">1</div>
      <div class="num n2">2</div>
      <div class="num n3">3</div>
      <div class="num n4">4</div>
      <div class="num n5">5</div>
      <div class="num n6">6</div>
    </div>
  </div>

  <button id="spinBtn" onclick="spin()">开始抽取</button>

  <div class="result" id="result"></div>
  <div class="remaining" id="remaining">剩余盲盒：1、2、3、4、5、6</div>
</div>

<script>
  // 你真正想要的抽取顺序
  // 例如：第一次抽5号，第二次抽2号，第三次抽1号……
  const fixedOrder = [5, 2, 1, 3, 4, 6];

  let drawIndex = 0;
  let currentRotation = 0;
  const wheel = document.getElementById("wheel");
  const result = document.getElementById("result");
  const remaining = document.getElementById("remaining");
  const spinBtn = document.getElementById("spinBtn");

  function angleForNumber(num) {
    // 6等分，每个60度。
    // 指针在上方，所以需要让目标数字转到上方。
    // 这里手动设置每个数字中心对应角度。
    const centers = {
      1: 0,
      2: 60,
      3: 120,
      4: 180,
      5: 240,
      6: 300
    };

    // 为了让目标停在上方，需要反向旋转到对应角度
    return 360 - centers[num];
  }

  function updateRemaining() {
    const used = fixedOrder.slice(0, drawIndex);
    const left = [1,2,3,4,5,6].filter(n => !used.includes(n));
    remaining.innerText = left.length
      ? "剩余盲盒：" + left.join("、")
      : "六个幸福瞬间已全部抽完";
  }

  function spin() {
    if (drawIndex >= fixedOrder.length) {
      result.innerText = "普通款已经抽完啦";
      return;
    }

    const target = fixedOrder[drawIndex];
    spinBtn.disabled = true;
    result.innerText = "抽取中...";

    const extraTurns = 5 + Math.floor(Math.random() * 3);
    const finalAngle = angleForNumber(target);

    currentRotation += extraTurns * 360 + finalAngle;
    wheel.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
      result.innerText = `请打开 ${target} 号盲盒`;
      drawIndex++;
      updateRemaining();

      if (drawIndex < fixedOrder.length) {
        spinBtn.disabled = false;
        spinBtn.innerText = "继续抽取";
      } else {
        spinBtn.disabled = true;
        spinBtn.innerText = "普通款已抽完";
      }
    }, 4200);
  }
</script>
</body>
</html>
