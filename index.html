<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>幸运转盘</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #fff7f0;
    color: #5a3b2e;
    text-align: center;
  }

  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  h1 {
    font-size: 26px;
    margin-bottom: 8px;
  }

  .wheel-wrap {
    position: relative;
    width: 308px;
    height: 308px;
    margin: 0 auto 24px;
    box-sizing: content-box;
  }

  .pointer {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 30px solid #e66a6a;
    z-index: 3;
  }

  .wheel {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 14px solid #f2c6b4;
    background: conic-gradient(
      #ffe0e0 0deg 60deg,
      #fff0c7 60deg 120deg,
      #dff2dd 120deg 180deg,
      #dbeafe 180deg 240deg,
      #eadcff 240deg 300deg,
      #ffe2bd 300deg 360deg
    );
    position: relative;
    transition: transform 4s cubic-bezier(.12,.72,.18,1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
    cursor: grab;
    touch-action: none;
    user-select: none;
  }

  .wheel.dragging {
    cursor: grabbing;
    transition: none;
  }

  .num {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: #5a3b2e;
    width: 40px;
    height: 40px;
    transform-origin: center;
  }

  .rank {
    position: absolute;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 50px;
    height: 18px;
    font-family: "Bradley Hand", "Segoe Print", "Comic Sans MS", cursive;
    font-size: 11px;
    font-style: italic;
    font-weight: 700;
    color: #9a5a50;
    transform-origin: center;
  }

  button {
    border: none;
    background: #e66a6a;
    color: white;
    font-size: 18px;
    padding: 13px 28px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(230,106,106,0.35);
  }

  button:disabled {
    background: #c9b8b0;
    cursor: not-allowed;
  }

  .confirm-btn {
    grid-area: confirm;
    justify-self: start;
    margin-left: 14px;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 15px;
    white-space: nowrap;
  }

  .result {
    margin-top: 22px;
    font-size: 22px;
    font-weight: 700;
    min-height: 32px;
  }

  .remaining {
    margin-top: 12px;
    font-size: 14px;
    color: #8a6a5a;
  }

  .controls {
    display: grid;
    grid-template-columns: 104px 132px 84px;
    grid-template-areas:
      "slice-label seed-label ."
      "slice-input seed-input confirm"
      ". without .";
    column-gap: 12px;
    row-gap: 6px;
    justify-content: center;
    align-items: center;
    margin-bottom: 18px;
  }

  .slice-label {
    grid-area: slice-label;
    justify-self: center;
    width: 74px;
  }

  .seed-label {
    grid-area: seed-label;
    justify-self: center;
    width: 132px;
  }

  .slice-input-wrap {
    grid-area: slice-input;
    justify-self: center;
    width: 74px;
    transform: translateX(-8px);
  }

  .seed-input {
    grid-area: seed-input;
    justify-self: center;
  }

  .without-wrap {
    grid-area: without;
    justify-self: center;
    width: 132px;
  }

  label {
    font-size: 14px;
    color: #8a6a5a;
  }

  .checkbox-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  input:not([type="checkbox"]) {
    box-sizing: border-box;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #e0b8a8;
    font-size: 15px;
    width: 180px;
    text-align: center;
  }

  #sliceCount {
    width: 74px;
    padding-left: 12px;
    padding-right: 12px;
    appearance: textfield;
    -moz-appearance: textfield;
  }

  #sliceCount::-webkit-outer-spin-button,
  #sliceCount::-webkit-inner-spin-button {
    margin: 0;
    appearance: none;
    -webkit-appearance: none;
  }

  .seed-input {
    width: 132px;
  }

  input[type="checkbox"] {
    width: 18px;
    height: 18px;
    accent-color: #e66a6a;
  }
</style>
</head>

<body>
<div class="container">
  <h1>幸运转盘</h1>

  <div class="controls">
    <label class="slice-label" for="sliceCount">格子数</label>
    <label class="seed-label" for="seed">幸运数字</label>
    <div class="slice-input-wrap">
      <input id="sliceCount" type="number" min="1" max="10" step="1" inputmode="numeric" value="5" />
    </div>
    <input class="seed-input" id="seed" placeholder="输入 seed" value="20260724" />
    <button class="confirm-btn" id="confirmSeedBtn" type="button">确认</button>
    <div class="without-wrap">
      <label class="checkbox-label" for="withoutReplacement">
        <input id="withoutReplacement" type="checkbox" checked />
        不放回抽取
      </label>
    </div>
  </div>

  <div class="wheel-wrap">
    <div class="pointer"></div>
    <div class="wheel" id="wheel"></div>
  </div>

  <button id="spinBtn" onclick="spin()">开始抽取</button>

  <div class="result" id="result"></div>
  <div class="remaining" id="remaining"></div>
</div>

<script>
  const colors = ["#ffe0e0", "#fff0c7", "#dff2dd", "#dbeafe", "#eadcff", "#ffe2bd", "#d7f6f0", "#ffd9ec", "#e5ecff", "#f7e5cf"];
  const germanNumbers = ["eins", "zwei", "drei", "vier", "fünf", "sechs", "sieben", "acht", "neun", "zehn"];
  const seedInput = document.getElementById("seed");
  const confirmSeedBtn = document.getElementById("confirmSeedBtn");
  const sliceCountInput = document.getElementById("sliceCount");
  const withoutReplacementInput = document.getElementById("withoutReplacement");
  let drawIndex = 0;
  let currentRotation = 0;
  let displayedNumbers = [];
  let drawOrder = [];
  let pendingRemoval = null;
  let activeSeed = 0;
  let activeSliceCount = 5;
  let sliceCount = 5;
  let spinToken = 0;
  let isDragging = false;
  let dragStartAngle = 0;
  let dragStartRotation = 0;
  const wheel = document.getElementById("wheel");
  const result = document.getElementById("result");
  const remaining = document.getElementById("remaining");
  const spinBtn = document.getElementById("spinBtn");

  function hashSeed(seed) {
    const text = String(seed || "0");
    let hash = 2166136261;
    for (let i = 0; i < text.length; i++) {
      hash ^= text.charCodeAt(i);
      hash = Math.imul(hash, 16777619);
    }
    return hash >>> 0;
  }

  function randomFromSeed(seed) {
    let state = hashSeed(seed);
    return function () {
      state += 0x6D2B79F5;
      let value = state;
      value = Math.imul(value ^ (value >>> 15), value | 1);
      value ^= value + Math.imul(value ^ (value >>> 7), value | 61);
      return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
    };
  }

  function getInputSliceCount() {
    const parsed = Number.parseInt(sliceCountInput.value, 10);
    if (Number.isNaN(parsed)) {
      return activeSliceCount;
    }
    return Math.min(10, Math.max(1, parsed));
  }

  function getInputSeedValue() {
    const seedText = seedInput.value.trim();
    if (!seedText) {
      return Date.now() + Math.floor(Math.random() * 1000000);
    }

    const parsed = Number(seedText);
    return Number.isFinite(parsed) ? parsed : 0;
  }

  function buildGradient(count) {
    const degrees = 360 / count;
    const stops = [];

    for (let index = 0; index < count; index++) {
      const start = index * degrees;
      const end = (index + 1) * degrees;
      stops.push(`${colors[index % colors.length]} ${start}deg ${end}deg`);
    }

    return `conic-gradient(${stops.join(", ")})`;
  }

  function buildDrawOrder(count) {
    const order = Array.from({ length: count }, (_, index) => index + 1);
    const random = randomFromSeed(activeSeed);

    for (let index = order.length - 1; index > 0; index--) {
      const targetIndex = Math.floor(random() * (index + 1));
      [order[index], order[targetIndex]] = [order[targetIndex], order[index]];
    }

    return order;
  }

  function getRankLabel(number) {
    const rankIndex = drawOrder.indexOf(number);
    return rankIndex >= 0 ? germanNumbers[rankIndex] : "";
  }

  function renderWheel() {
    const displayCount = displayedNumbers.length;
    wheel.innerHTML = "";
    wheel.style.background = displayCount ? buildGradient(displayCount) : "transparent";

    const numberRadius = 86;
    const rankRadius = 144;
    const center = 140;

    displayedNumbers.forEach((number, index) => {
      const angle = ((index + 0.5) * 360) / displayCount;
      const radians = (angle - 90) * Math.PI / 180;
      const label = document.createElement("div");
      label.className = "num";
      label.innerText = number;
      label.style.left = `${center + Math.cos(radians) * numberRadius - 20}px`;
      label.style.top = `${center + Math.sin(radians) * numberRadius - 20}px`;
      label.style.transform = `rotate(${angle}deg)`;
      wheel.appendChild(label);

      const rank = document.createElement("div");
      rank.className = "rank";
      rank.innerText = getRankLabel(number);
      rank.style.left = `${center + Math.cos(radians) * rankRadius - 24}px`;
      rank.style.top = `${center + Math.sin(radians) * rankRadius - 9}px`;
      rank.style.transform = `rotate(${angle}deg)`;
      wheel.appendChild(rank);
    });
  }

  function resetWheel() {
    sliceCount = activeSliceCount;
    sliceCountInput.value = sliceCount;
    drawOrder = buildDrawOrder(sliceCount);
    displayedNumbers = Array.from({ length: sliceCount }, (_, index) => index + 1);
    pendingRemoval = null;
    drawIndex = 0;
    currentRotation = 0;
    spinToken++;
    result.innerText = "";
    wheel.style.transition = "none";
    wheel.style.transform = "rotate(0deg)";
    renderWheel();
    updateRemaining();
    spinBtn.disabled = false;
    spinBtn.innerText = "开始抽取";
    requestAnimationFrame(() => {
      wheel.style.transition = "transform 4s cubic-bezier(.12,.72,.18,1)";
    });
  }

  function confirmSettings() {
    activeSeed = getInputSeedValue();
    activeSliceCount = getInputSliceCount();
    resetWheel();
  }

  function removePendingNumber() {
    if (!withoutReplacementInput.checked || pendingRemoval === null) {
      return;
    }

    displayedNumbers = displayedNumbers.filter(number => number !== pendingRemoval);
    pendingRemoval = null;
    currentRotation = 0;
    wheel.style.transition = "none";
    wheel.style.transform = "rotate(0deg)";
    renderWheel();
    wheel.offsetHeight;
    wheel.style.transition = "transform 4s cubic-bezier(.12,.72,.18,1)";
  }

  function angleForIndex(index, count) {
    const center = ((index + 0.5) * 360) / count;
    return 360 - center;
  }

  function getPointerAngle(event) {
    const rect = wheel.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    return Math.atan2(event.clientY - centerY, event.clientX - centerX) * 180 / Math.PI;
  }

  function setWheelRotation(rotation) {
    currentRotation = rotation;
    wheel.style.transform = `rotate(${currentRotation}deg)`;
  }

  function startDrag(event) {
    event.preventDefault();
    isDragging = true;
    dragStartAngle = getPointerAngle(event);
    dragStartRotation = currentRotation;
    wheel.classList.add("dragging");
    wheel.style.transition = "none";
    wheel.setPointerCapture(event.pointerId);
  }

  function dragWheel(event) {
    if (!isDragging) {
      return;
    }

    event.preventDefault();
    const angleDelta = getPointerAngle(event) - dragStartAngle;
    setWheelRotation(dragStartRotation + angleDelta);
  }

  function endDrag(event) {
    if (!isDragging) {
      return;
    }

    isDragging = false;
    wheel.classList.remove("dragging");
    if (wheel.hasPointerCapture(event.pointerId)) {
      wheel.releasePointerCapture(event.pointerId);
    }
    wheel.style.transition = "transform 4s cubic-bezier(.12,.72,.18,1)";
  }

  function updateRemaining() {
    if (!withoutReplacementInput.checked) {
      remaining.innerText = "当前模式：可重复抽取";
      return;
    }

    const remainingNumbers = pendingRemoval === null
      ? displayedNumbers
      : displayedNumbers.filter(number => number !== pendingRemoval);
    remaining.innerText = remainingNumbers.length
      ? "剩余格子：" + remainingNumbers.join("、")
      : "所有格子已全部抽完";
  }

  function getNextTarget() {
    if (drawOrder.length === 0) {
      return null;
    }

    if (!withoutReplacementInput.checked) {
      return drawOrder[drawIndex % drawOrder.length];
    }

    return drawOrder[drawIndex] ?? null;
  }

  function spin() {
    removePendingNumber();

    const target = getNextTarget();
    if (target === null || displayedNumbers.length === 0) {
      result.innerText = "已经抽完啦";
      return;
    }

    const token = ++spinToken;
    const targetIndex = displayedNumbers.indexOf(target);
    if (targetIndex === -1) {
      result.innerText = "已经抽完啦";
      return;
    }

    spinBtn.disabled = true;
    result.innerText = "抽取中...";

    const extraTurns = 6;
    const finalAngle = angleForIndex(targetIndex, displayedNumbers.length);
    const currentAngle = ((currentRotation % 360) + 360) % 360;
    const deltaAngle = (finalAngle - currentAngle + 360) % 360;

    currentRotation += extraTurns * 360 + deltaAngle;
    wheel.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
      if (token !== spinToken) {
        return;
      }

      result.innerText = `抽中了 ${target} 号`;
      drawIndex++;
      pendingRemoval = withoutReplacementInput.checked ? target : null;
      updateRemaining();

      if (!withoutReplacementInput.checked || displayedNumbers.length > 1) {
        spinBtn.disabled = false;
        spinBtn.innerText = "继续抽取";
      } else {
        spinBtn.disabled = true;
        spinBtn.innerText = "已抽完";
      }
    }, 4200);
  }

  confirmSeedBtn.addEventListener("click", confirmSettings);
  sliceCountInput.addEventListener("change", () => {
    sliceCountInput.value = getInputSliceCount();
  });
  sliceCountInput.addEventListener("wheel", (event) => {
    event.preventDefault();
    const direction = event.deltaY > 0 ? -1 : 1;
    sliceCountInput.value = Math.min(10, Math.max(1, getInputSliceCount() + direction));
  }, { passive: false });
  withoutReplacementInput.addEventListener("change", resetWheel);
  wheel.addEventListener("pointerdown", startDrag);
  wheel.addEventListener("pointermove", dragWheel);
  wheel.addEventListener("pointerup", endDrag);
  wheel.addEventListener("pointercancel", endDrag);
  activeSeed = getInputSeedValue();
  activeSliceCount = getInputSliceCount();
  resetWheel();
</script>
</body>
</html>
