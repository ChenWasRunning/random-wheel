<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>幸运转盘</title>
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #fff7f0;
    color: #5a3b2e;
    text-align: center;
  }

  .container {
    max-width: 420px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  h1 {
    font-size: 26px;
    margin-bottom: 8px;
  }

  .subtitle {
    font-size: 14px;
    color: #8a6a5a;
    margin-bottom: 25px;
  }

  .wheel-wrap {
    position: relative;
    width: 280px;
    height: 280px;
    margin: 0 auto 24px;
  }

  .pointer {
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-top: 30px solid #e66a6a;
    z-index: 3;
  }

  .wheel {
    width: 280px;
    height: 280px;
    border-radius: 50%;
    border: 8px solid #f2c6b4;
    background: conic-gradient(
      #ffe0e0 0deg 60deg,
      #fff0c7 60deg 120deg,
      #dff2dd 120deg 180deg,
      #dbeafe 180deg 240deg,
      #eadcff 240deg 300deg,
      #ffe2bd 300deg 360deg
    );
    position: relative;
    transition: transform 4s cubic-bezier(.12,.72,.18,1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.12);
  }

  .num {
    position: absolute;
    font-size: 28px;
    font-weight: 700;
    color: #5a3b2e;
    width: 40px;
    height: 40px;
    line-height: 40px;
  }

  button {
    border: none;
    background: #e66a6a;
    color: white;
    font-size: 18px;
    padding: 13px 28px;
    border-radius: 999px;
    cursor: pointer;
    box-shadow: 0 6px 14px rgba(230,106,106,0.35);
  }

  button:disabled {
    background: #c9b8b0;
    cursor: not-allowed;
  }

  .result {
    margin-top: 22px;
    font-size: 22px;
    font-weight: 700;
    min-height: 32px;
  }

  .remaining {
    margin-top: 12px;
    font-size: 14px;
    color: #8a6a5a;
  }

  .controls {
    display: grid;
    gap: 12px;
    justify-items: center;
    margin-bottom: 18px;
  }

  .field {
    display: grid;
    gap: 6px;
    justify-items: center;
  }

  label {
    font-size: 14px;
    color: #8a6a5a;
  }

  input {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid #e0b8a8;
    font-size: 15px;
    width: 180px;
    text-align: center;
  }
</style>
</head>

<body>
<div class="container">
  <h1>幸运转盘</h1>
  <div class="subtitle">输入你的幸运数字</div>

  <div class="controls">
    <div class="field">
      <input id="seed" placeholder="输入 seed" value="20260724" />
    </div>
    <div class="field">
      <label for="sliceCount">幸运转盘格子数</label>
      <input id="sliceCount" list="sliceCountOptions" inputmode="numeric" pattern="[0-9]*" value="6" />
      <datalist id="sliceCountOptions">
        <option value="1"></option>
        <option value="2"></option>
        <option value="3"></option>
        <option value="4"></option>
        <option value="5"></option>
        <option value="6"></option>
        <option value="7"></option>
        <option value="8"></option>
        <option value="9"></option>
        <option value="10"></option>
      </datalist>
    </div>
  </div>

  <div class="wheel-wrap">
    <div class="pointer"></div>
    <div class="wheel" id="wheel"></div>
  </div>

  <button id="spinBtn" onclick="spin()">开始抽取</button>

  <div class="result" id="result"></div>
  <div class="remaining" id="remaining"></div>
</div>

<script>
  const colors = ["#ffe0e0", "#fff0c7", "#dff2dd", "#dbeafe", "#eadcff", "#ffe2bd", "#d7f6f0", "#ffd9ec", "#e5ecff", "#f7e5cf"];
  const seedInput = document.getElementById("seed");
  const sliceCountInput = document.getElementById("sliceCount");
  let drawIndex = 0;
  let currentRotation = 0;
  let wheelOrder = [];
  let sliceCount = 6;
  const wheel = document.getElementById("wheel");
  const result = document.getElementById("result");
  const remaining = document.getElementById("remaining");
  const spinBtn = document.getElementById("spinBtn");

  function hashSeed(seed) {
    const text = String(seed || "0");
    let hash = 2166136261;
    for (let i = 0; i < text.length; i++) {
      hash ^= text.charCodeAt(i);
      hash = Math.imul(hash, 16777619);
    }
    return hash >>> 0;
  }

  function randomFromSeed(seed) {
    let state = hashSeed(seed);
    return function () {
      state += 0x6D2B79F5;
      let value = state;
      value = Math.imul(value ^ (value >>> 15), value | 1);
      value ^= value + Math.imul(value ^ (value >>> 7), value | 61);
      return ((value ^ (value >>> 14)) >>> 0) / 4294967296;
    };
  }

  function buildOrder(count) {
    const order = Array.from({ length: count }, (_, index) => index + 1);
    const random = randomFromSeed(seedInput.value + ":" + count);

    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }

    return order;
  }

  function getSliceCount() {
    const parsed = Number.parseInt(sliceCountInput.value, 10);
    if (Number.isNaN(parsed)) {
      return 6;
    }
    return Math.min(10, Math.max(1, parsed));
  }

  function buildGradient(count) {
    const degrees = 360 / count;
    const stops = [];

    for (let index = 0; index < count; index++) {
      const start = index * degrees;
      const end = (index + 1) * degrees;
      stops.push(`${colors[index % colors.length]} ${start}deg ${end}deg`);
    }

    return `conic-gradient(${stops.join(", ")})`;
  }

  function renderWheel() {
    wheel.innerHTML = "";
    wheel.style.background = buildGradient(sliceCount);

    const radius = 94;
    const center = 140;

    for (let number = 1; number <= sliceCount; number++) {
      const angle = ((number - 0.5) * 360) / sliceCount;
      const radians = (angle - 90) * Math.PI / 180;
      const label = document.createElement("div");
      label.className = "num";
      label.innerText = number;
      label.style.left = `${center + Math.cos(radians) * radius - 20}px`;
      label.style.top = `${center + Math.sin(radians) * radius - 20}px`;
      wheel.appendChild(label);
    }
  }

  function resetWheel() {
    sliceCount = getSliceCount();
    sliceCountInput.value = sliceCount;
    wheelOrder = buildOrder(sliceCount);
    drawIndex = 0;
    currentRotation = 0;
    result.innerText = "";
    wheel.style.transition = "none";
    wheel.style.transform = "rotate(0deg)";
    renderWheel();
    updateRemaining();
    spinBtn.disabled = false;
    spinBtn.innerText = "开始抽取";
    requestAnimationFrame(() => {
      wheel.style.transition = "transform 4s cubic-bezier(.12,.72,.18,1)";
    });
  }

  function angleForNumber(num) {
    const center = ((num - 0.5) * 360) / sliceCount;
    return 360 - center;
  }

  function updateRemaining() {
    const used = wheelOrder.slice(0, drawIndex);
    const left = Array.from({ length: sliceCount }, (_, index) => index + 1).filter(n => !used.includes(n));
    remaining.innerText = left.length
      ? "剩余格子：" + left.join("、")
      : "所有格子已全部抽完";
  }

  function spin() {
    if (drawIndex >= wheelOrder.length) {
      result.innerText = "已经抽完啦";
      return;
    }

    const target = wheelOrder[drawIndex];
    spinBtn.disabled = true;
    result.innerText = "抽取中...";

    const extraTurns = 5 + Math.floor(Math.random() * 3);
    const finalAngle = angleForNumber(target);

    currentRotation += extraTurns * 360 + finalAngle;
    wheel.style.transform = `rotate(${currentRotation}deg)`;

    setTimeout(() => {
      result.innerText = `抽中了 ${target} 号`;
      drawIndex++;
      updateRemaining();

      if (drawIndex < wheelOrder.length) {
        spinBtn.disabled = false;
        spinBtn.innerText = "继续抽取";
      } else {
        spinBtn.disabled = true;
        spinBtn.innerText = "已抽完";
      }
    }, 4200);
  }

  seedInput.addEventListener("change", resetWheel);
  sliceCountInput.addEventListener("change", resetWheel);
  resetWheel();
</script>
</body>
</html>
